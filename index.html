<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Produktionsrechner</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#eab308">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Produktion">
  <link rel="apple-touch-icon" href="icon-192.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f0f1a;
      --surface:   #1a1a2e;
      --card:      #22223a;
      --border:    rgba(255,255,255,0.08);
      --border-hi: rgba(234,179,8,0.5);
      --text:      #f0f0f0;
      --muted:     #8888aa;
      --amber:     #eab308;
      --amber-bg:  rgba(234,179,8,0.12);
      --green:     #4ade80;
      --green-bg:  rgba(74,222,128,0.12);
      --red:       #f87171;
      --red-bg:    rgba(248,113,113,0.12);
      --radius:    10px;
      --gap:       12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 15px;
      min-height: 100dvh;
      padding: 16px;
    }

    header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    header img { width: 36px; height: 36px; border-radius: 8px; }
    header h1 { font-size: 18px; font-weight: 600; color: var(--text); }
    header span { font-size: 12px; color: var(--muted); margin-left: auto; }

    .section {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      margin-bottom: var(--gap);
    }
    .section-title {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: var(--gap); margin-bottom: var(--gap); }
    .grid4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }

    .field { display: flex; flex-direction: column; gap: 5px; }
    .field label { font-size: 12px; color: var(--muted); }
    .field input {
      background: var(--card);
      border: 0.5px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-size: 15px;
      padding: 9px 11px;
      width: 100%;
      outline: none;
      transition: border-color 0.15s;
    }
    .field input:focus { border-color: var(--amber); }
    input[type="date"]::-webkit-calendar-picker-indicator,
    input[type="time"]::-webkit-calendar-picker-indicator { filter: invert(0.6); }

    .metric {
      background: var(--card);
      border: 0.5px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
    }
    .metric-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
    .metric-value { font-size: 18px; font-weight: 600; font-family: 'SF Mono', 'Fira Code', monospace; color: var(--text); }
    .metric-sub { font-size: 11px; color: var(--muted); margin-top: 3px; }

    .finish-card {
      background: var(--card);
      border: 0.5px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      margin-top: var(--gap);
    }
    .finish-value {
      font-size: 20px;
      font-weight: 600;
      font-family: 'SF Mono', 'Fira Code', monospace;
      color: var(--amber);
      margin: 4px 0 2px;
    }

    .badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 20px;
      margin-top: 10px;
    }
    .badge-exact  { background: rgba(255,255,255,0.07); color: var(--muted); }
    .badge-over   { background: var(--green-bg); color: var(--green); }
    .badge-under  { background: var(--red-bg); color: var(--red); }
    .badge-tol    { background: var(--amber-bg); color: var(--amber); }

    .tol-highlight {
      border-color: var(--border-hi) !important;
      background: var(--amber-bg) !important;
    }
    .c-over   { color: var(--green) !important; }
    .c-under  { color: var(--red) !important; }
    .c-tol    { color: var(--amber) !important; }
    .c-neutral{ color: var(--muted) !important; }

    footer {
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      margin-top: 8px;
      padding-bottom: 8px;
    }

    @media (max-width: 420px) {
      .grid4 { grid-template-columns: 1fr 1fr; }
      .finish-value { font-size: 17px; }
    }
  </style>
</head>
<body>

<header>
  <img src="icon-192.png" alt="Icon">
  <h1>Produktionsrechner</h1>
</header>

<div class="section">
  <p class="section-title">Auftragsdaten</p>
  <div class="grid2">
    <div class="field"><label>Startdatum</label><input type="date" id="startDate"></div>
    <div class="field"><label>Startzeit</label><input type="time" id="startTime" value="06:00"></div>
  </div>
  <div class="grid2" style="margin-bottom:0">
    <div class="field"><label>Auftragsgröße (km)</label><input type="number" id="orderSize" min="0" step="0.1" placeholder="z.B. 5000"></div>
    <div class="field"><label>Sollmenge pro Tag (km)</label><input type="number" id="dailyTarget" min="0" step="0.1" placeholder="z.B. 200"></div>
  </div>
</div>

<div class="section">
  <p class="section-title">Fertigstellung</p>
  <div class="grid2">
    <div class="metric">
      <div class="metric-label">Benötigte Tage</div>
      <div class="metric-value" id="res-days">—</div>
      <div class="metric-sub" id="res-days-sub">&nbsp;</div>
    </div>
    <div class="metric">
      <div class="metric-label">Tage ab Start</div>
      <div class="metric-value" id="res-days2">—</div>
      <div class="metric-sub">&nbsp;</div>
    </div>
  </div>
  <div class="finish-card">
    <div class="metric-label">Auftrag fertig am</div>
    <div class="finish-value" id="res-finish">—</div>
    <div class="metric-sub" id="res-finish-sub">&nbsp;</div>
  </div>
</div>

<div class="section">
  <p class="section-title">Auftragsende</p>
  <div class="grid2">
    <div class="field"><label>Zieldatum</label><input type="date" id="targetDate"></div>
    <div class="field"><label>Zielzeit</label><input type="time" id="targetTime" value="06:00"></div>
  </div>
  <div class="grid4">
    <div class="metric" id="card-days">
      <div class="metric-label">Laufzeit Tage</div>
      <div class="metric-value" id="t-days">—</div>
    </div>
    <div class="metric" id="card-km">
      <div class="metric-label">Produzierbare km</div>
      <div class="metric-value" id="t-km">—</div>
    </div>
    <div class="metric" id="card-diff-km">
      <div class="metric-label">Differenz km</div>
      <div class="metric-value" id="t-diff-km">—</div>
    </div>
    <div class="metric" id="card-diff-pct">
      <div class="metric-label">Differenz %</div>
      <div class="metric-value" id="t-diff-pct">—</div>
    </div>
  </div>
  <div id="t-status-row"></div>
</div>

<script>
function pad(n) { return String(n).padStart(2,'0'); }

function formatDate(d) {
  const days = ['So','Mo','Di','Mi','Do','Fr','Sa'];
  return days[d.getDay()] + ', ' + pad(d.getDate()) + '.' + pad(d.getMonth()+1) + '.' + d.getFullYear()
       + ' · ' + pad(d.getHours()) + ':' + pad(d.getMinutes()) + ' Uhr';
}

function clearTol() {
  ['card-diff-km','card-diff-pct'].forEach(id => {
    const el = document.getElementById(id);
    el.classList.remove('tol-highlight');
  });
}

let userEditedTarget = false;
let cachedFinishMs = null, cachedDaily = null, cachedStartMs = null;

function calcTarget(targetMs) {
  clearTol();
  if (!targetMs || !cachedStartMs || !cachedDaily) return;
  const orderSize = parseFloat(document.getElementById('orderSize').value);
  const availableDays = (targetMs - cachedStartMs) / 86400000;
  const producibleKm  = availableDays * cachedDaily;
  const diffKm  = producibleKm - orderSize;
  const diffPct = diffKm / orderSize * 100;
  const absPct  = Math.abs(diffPct);
  const sign    = diffKm >= 0 ? '+' : '';

  document.getElementById('t-days').textContent = availableDays.toFixed(2);
  document.getElementById('t-km').textContent   = producibleKm.toFixed(1);

  const dkEl  = document.getElementById('t-diff-km');
  const dpEl  = document.getElementById('t-diff-pct');
  const stRow = document.getElementById('t-status-row');

  if (Math.abs(diffKm) < 0.01) {
    dkEl.textContent = '0.00';   dkEl.className = 'metric-value c-neutral';
    dpEl.textContent = '0.00%';  dpEl.className = 'metric-value c-neutral';
    stRow.innerHTML = '<span class="badge badge-exact">Exakt auf Ziel</span>';
  } else if (absPct <= 10) {
    dkEl.textContent = sign + diffKm.toFixed(1);  dkEl.className = 'metric-value c-tol';
    dpEl.textContent = sign + diffPct.toFixed(1) + '%'; dpEl.className = 'metric-value c-tol';
    document.getElementById('card-diff-km').classList.add('tol-highlight');
    document.getElementById('card-diff-pct').classList.add('tol-highlight');
    const dir = diffKm > 0 ? 'über' : 'unter';
    stRow.innerHTML = '<span class="badge badge-tol">±10 % Toleranz · ' + sign + diffKm.toFixed(1) + ' km ' + dir + ' Auftrag (' + sign + diffPct.toFixed(1) + '%)</span>';
  } else if (diffKm > 0) {
    dkEl.textContent = '+' + diffKm.toFixed(1);   dkEl.className = 'metric-value c-over';
    dpEl.textContent = '+' + diffPct.toFixed(1) + '%'; dpEl.className = 'metric-value c-over';
    stRow.innerHTML = '<span class="badge badge-over">+' + diffKm.toFixed(1) + ' km über Auftrag · +' + diffPct.toFixed(1) + '%</span>';
  } else {
    dkEl.textContent = diffKm.toFixed(1);   dkEl.className = 'metric-value c-under';
    dpEl.textContent = diffPct.toFixed(1) + '%'; dpEl.className = 'metric-value c-under';
    stRow.innerHTML = '<span class="badge badge-under">' + diffKm.toFixed(1) + ' km unter Auftrag · ' + diffPct.toFixed(1) + '%</span>';
  }
}

function getTargetMs() {
  const d = document.getElementById('targetDate').value;
  const t = document.getElementById('targetTime').value || '06:00';
  return d ? new Date(d + 'T' + t).getTime() : null;
}

function calc() {
  const sdv  = document.getElementById('startDate').value;
  const stv  = document.getElementById('startTime').value || '06:00';
  const ord  = parseFloat(document.getElementById('orderSize').value);
  const daily= parseFloat(document.getElementById('dailyTarget').value);
  const ok   = sdv && !isNaN(ord) && ord > 0 && !isNaN(daily) && daily > 0;

  if (!ok) {
    ['res-days','res-days2','res-finish'].forEach(id => document.getElementById(id).textContent = '—');
    document.getElementById('res-days-sub').textContent = '\u00a0';
    document.getElementById('res-finish-sub').textContent = '\u00a0';
    cachedFinishMs = cachedDaily = cachedStartMs = null;
    clearTol(); return;
  }

  cachedDaily   = daily;
  cachedStartMs = new Date(sdv + 'T' + stv).getTime();
  const daysNeeded = ord / daily;
  const finishMs   = cachedStartMs + daysNeeded * 86400000;
  cachedFinishMs   = finishMs;
  const fin        = new Date(finishMs);

  document.getElementById('res-days').textContent    = daysNeeded.toFixed(2);
  document.getElementById('res-days2').textContent   = daysNeeded.toFixed(1);
  document.getElementById('res-days-sub').textContent= Math.ceil(daysNeeded) + ' volle Tage';
  document.getElementById('res-finish').textContent  = formatDate(fin);
  document.getElementById('res-finish-sub').textContent = daysNeeded.toFixed(1) + ' Tage ab Start';

  if (!userEditedTarget) {
    document.getElementById('targetDate').value = fin.toISOString().slice(0,10);
    document.getElementById('targetTime').value = pad(fin.getHours()) + ':' + pad(fin.getMinutes());
    calcTarget(finishMs);
  } else {
    calcTarget(getTargetMs());
  }
}

document.getElementById('startDate').value = new Date().toISOString().slice(0,10);

['startDate','startTime','orderSize','dailyTarget'].forEach(id =>
  document.getElementById(id).addEventListener('input', () => { userEditedTarget = false; calc(); })
);
['targetDate','targetTime'].forEach(id =>
  document.getElementById(id).addEventListener('input', () => { userEditedTarget = true; calcTarget(getTargetMs()); })
);

calc();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js');
}
</script>
</body>
</html>
